<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SOLARIUM · 太阳系学习模型</title>
<script src="https://cdn.tailwindcss.com"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;700&family=Manrope:wght@200;300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>
<style>
  :root {
    --bg: #06060c; --bg-2: #0c0c18;
    --fg: #f5e6d3; --fg-dim: #b8a890; --muted: #6e6a5e;
    --accent: #ff9544; --accent-2: #ffd166; --accent-3: #4ecdc4;
    --border: rgba(245, 230, 211, 0.1);
    --border-strong: rgba(245, 230, 211, 0.2);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg); color: var(--fg);
    font-family: 'Manrope', system-ui, sans-serif;
    overflow: hidden; height: 100vh; width: 100vw;
  }
  .font-display { font-family: 'Cormorant Garamond', serif; }
  .font-mono { font-family: 'JetBrains Mono', monospace; }
  
  .app {
    display: grid;
    grid-template-columns: 340px 1fr 420px;
    grid-template-rows: 68px 1fr;
    height: 100vh; width: 100vw;
  }
  .topbar {
    grid-column: 1 / -1;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(12,12,24,0.95), rgba(6,6,12,0.7));
    backdrop-filter: blur(20px);
    display: flex; align-items: center; gap: 16px;
    padding: 0 20px; position: relative; z-index: 10;
    overflow-x: auto; overflow-y: hidden;
    scrollbar-width: thin;
  }
  .topbar::-webkit-scrollbar { height: 4px; }
  .topbar::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }
  .topbar-section { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
  .topbar-spacer { flex: 1; min-width: 8px; }
  
  .logo-mark {
    width: 36px; height: 36px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #ffe4a3, #ff9544 40%, #c93d00 80%, #5a1500);
    box-shadow: 0 0 24px rgba(255, 149, 68, 0.5), inset -4px -6px 12px rgba(0,0,0,0.4);
    position: relative; flex-shrink: 0;
  }
  .logo-mark::after {
    content: ''; position: absolute; inset: -8px;
    border-radius: 50%;
    border: 1px solid rgba(255, 149, 68, 0.3);
    animation: ring-pulse 3s ease-in-out infinite;
  }
  @keyframes ring-pulse {
    0%, 100% { transform: scale(1); opacity: 0.5; }
    50% { transform: scale(1.15); opacity: 0; }
  }
  
  .left-panel {
    border-right: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(12,12,24,0.6), rgba(6,6,12,0.4));
    backdrop-filter: blur(12px);
    overflow-y: auto; padding: 24px 20px;
  }
  
  .right-panel {
    border-left: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(12,12,24,0.92), rgba(6,6,12,0.85));
    backdrop-filter: blur(12px);
    overflow: hidden; padding: 0;
    transform: translateX(100%);
    transition: transform 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    display: flex; flex-direction: column;
  }
  .right-panel.open { transform: translateX(0); }
  
  .right-panel-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 22px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
    background: linear-gradient(180deg, rgba(255,149,68,0.04), transparent);
  }
  .right-panel-body { flex: 1; overflow-y: auto; padding: 22px; }
  
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 8px 14px 8px 10px;
    border-radius: 10px;
    border: 1px solid var(--border-strong);
    background: rgba(255,255,255,0.03);
    color: var(--fg);
    font-size: 12px; cursor: pointer;
    transition: all 0.2s;
    font-family: inherit; letter-spacing: 0.05em;
  }
  .back-btn:hover {
    background: rgba(255, 149, 68, 0.1);
    border-color: rgba(255, 149, 68, 0.5);
    color: var(--accent);
    transform: translateX(-2px);
  }
  
  .close-btn {
    width: 36px; height: 36px;
    border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--fg-dim); cursor: pointer;
    display: inline-flex; align-items: center; justify-content: center;
    transition: all 0.2s; flex-shrink: 0;
  }
  .close-btn:hover {
    background: rgba(255, 80, 80, 0.1);
    border-color: rgba(255, 80, 80, 0.4);
    color: #ff6464;
  }
  
  .canvas-wrap {
    position: relative; overflow: hidden;
    background: radial-gradient(ellipse at center, #0a0a18 0%, #050508 70%);
    min-width: 0; min-height: 0;
  }
  #scene-canvas { display: block; width: 100%; height: 100%; cursor: grab; }
  #scene-canvas:active { cursor: grabbing; }
  
  .planet-item {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 14px;
    border: 1px solid var(--border);
    border-radius: 10px; margin-bottom: 8px;
    cursor: pointer; transition: all 0.25s ease;
    background: rgba(255, 255, 255, 0.01);
    position: relative; overflow: hidden;
  }
  .planet-item::before {
    content: ''; position: absolute;
    left: 0; top: 0; bottom: 0; width: 2px;
    background: var(--planet-color);
    opacity: 0; transition: opacity 0.25s;
  }
  .planet-item:hover {
    background: rgba(255, 255, 255, 0.04);
    border-color: var(--border-strong);
    transform: translateX(4px);
  }
  .planet-item:hover::before { opacity: 1; }
  .planet-item.active {
    background: rgba(255, 149, 68, 0.08);
    border-color: rgba(255, 149, 68, 0.3);
  }
  .planet-item.active::before { opacity: 1; }
  
  .planet-dot {
    width: 22px; height: 22px; border-radius: 50%;
    background: var(--planet-color);
    box-shadow: 0 0 12px var(--planet-color), inset -3px -4px 6px rgba(0,0,0,0.4);
    flex-shrink: 0;
  }
  
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  
  .ctrl-btn {
    width: 38px; height: 38px; border-radius: 10px;
    border: 1px solid var(--border);
    background: rgba(255,255,255,0.03);
    color: var(--fg);
    display: inline-flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all 0.2s; flex-shrink: 0;
  }
  .ctrl-btn:hover {
    background: rgba(255, 149, 68, 0.1);
    border-color: rgba(255, 149, 68, 0.4);
    color: var(--accent);
  }
  .ctrl-btn.active {
    background: rgba(255, 149, 68, 0.15);
    border-color: var(--accent);
    color: var(--accent);
    box-shadow: 0 0 12px rgba(255, 149, 68, 0.3);
  }
  
  .info-card {
    background: rgba(255,255,255,0.02);
    border: 1px solid var(--border);
    border-radius: 12px; padding: 14px;
  }
  
  .stat-row {
    display: flex; justify-content: space-between; align-items: baseline;
    padding: 8px 0;
    border-bottom: 1px dashed var(--border);
    gap: 12px;
  }
  .stat-row:last-child { border-bottom: none; }
  .stat-label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.1em; color: var(--muted); flex-shrink: 0; }
  .stat-value { font-family: 'JetBrains Mono', monospace; font-size: 13px; color: var(--fg); text-align: right; }
  
  .time-slider {
    -webkit-appearance: none; appearance: none;
    width: 100%; height: 4px;
    background: rgba(255,255,255,0.1);
    border-radius: 2px; outline: none;
  }
  .time-slider::-webkit-slider-thumb {
    -webkit-appearance: none; appearance: none;
    width: 16px; height: 16px;
    background: var(--accent); border-radius: 50%;
    cursor: pointer;
    box-shadow: 0 0 12px var(--accent), 0 0 24px rgba(255,149,68,0.4);
  }
  .time-slider::-moz-range-thumb {
    width: 16px; height: 16px;
    background: var(--accent); border-radius: 50%;
    cursor: pointer; border: none;
  }
  
  .overlay { position: absolute; z-index: 5; pointer-events: none; }
  .overlay > * { pointer-events: auto; }
  
  .time-bar {
    bottom: 24px; left: 50%;
    transform: translateX(-50%);
    width: min(620px, calc(100% - 40px));
    max-width: 100%;
    background: rgba(8, 8, 16, 0.9);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border-strong);
    border-radius: 16px; padding: 12px 16px;
    display: flex; align-items: center; gap: 12px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.4);
  }
  
  .hint-bar {
    top: 84px; right: 24px;
    background: rgba(8, 8, 16, 0.7);
    backdrop-filter: blur(12px);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 8px 14px;
    font-size: 11px; color: var(--fg-dim);
    display: flex; gap: 14px; align-items: center;
    flex-wrap: wrap; max-width: calc(100% - 48px);
  }
  .hint-bar kbd {
    background: rgba(255,255,255,0.06);
    border: 1px solid var(--border-strong);
    padding: 2px 6px; border-radius: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
  }
  
  .planet-label {
    position: absolute;
    transform: translate(-50%, -50%);
    pointer-events: none;
    font-size: 10px; color: var(--fg-dim);
    text-transform: uppercase;
    letter-spacing: 0.2em;
    white-space: nowrap;
    text-shadow: 0 0 8px rgba(0,0,0,0.8), 0 0 4px rgba(0,0,0,1);
    transition: opacity 0.3s;
  }
  .planet-label::before {
    content: ''; display: inline-block;
    width: 18px; height: 1px;
    background: currentColor;
    margin-right: 6px; vertical-align: middle;
    opacity: 0.5;
  }
  
  .toast {
    position: fixed;
    top: 88px; left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: rgba(8,8,16,0.95);
    border: 1px solid var(--accent);
    color: var(--accent);
    padding: 10px 20px; border-radius: 10px;
    font-size: 13px; opacity: 0;
    transition: all 0.3s;
    pointer-events: none; z-index: 100;
    backdrop-filter: blur(20px);
    box-shadow: 0 8px 32px rgba(255,149,68,0.2);
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  
  .solar-svg { width: 100%; height: 120px; display: block; }
  
  .section-title {
    font-size: 10px; text-transform: uppercase;
    letter-spacing: 0.25em; color: var(--muted);
    margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  
  .detail-3d-wrap {
    width: 100%; aspect-ratio: 1;
    max-height: 360px;
    border-radius: 16px;
    overflow: hidden; position: relative;
    background: radial-gradient(ellipse at center, #0a0a18 0%, #050508 70%);
    border: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .detail-3d-wrap canvas {
    display: block; width: 100% !important; height: 100% !important;
    cursor: grab;
  }
  .detail-3d-wrap canvas:active { cursor: grabbing; }
  .detail-3d-hint {
    position: absolute; bottom: 10px; left: 12px;
    font-size: 10px; color: var(--muted);
    letter-spacing: 0.15em; text-transform: uppercase;
    pointer-events: none;
    text-shadow: 0 0 6px rgba(0,0,0,0.8);
  }
  .detail-3d-loading {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: rgba(6,6,12,0.6); z-index: 2;
    transition: opacity 0.4s;
  }
  .detail-3d-loading.hide { opacity: 0; pointer-events: none; }
  .detail-3d-loading-orbit {
    width: 50px; height: 50px;
    border: 1px solid var(--border-strong);
    border-radius: 50%; position: relative;
    animation: spin 1.5s linear infinite;
  }
  .detail-3d-loading-orbit::after {
    content: ''; position: absolute;
    top: -3px; left: 50%;
    transform: translateX(-50%);
    width: 6px; height: 6px;
    background: var(--accent); border-radius: 50%;
    box-shadow: 0 0 12px var(--accent);
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  
  .loader {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 1000;
    transition: opacity 0.6s, visibility 0.6s;
  }
  .loader.hide { opacity: 0; visibility: hidden; }
  .loader-orbit {
    width: 80px; height: 80px;
    border: 1px solid var(--border);
    border-radius: 50%; position: relative;
    animation: spin 2s linear infinite;
  }
  .loader-orbit::after {
    content: ''; position: absolute;
    top: -4px; left: 50%;
    transform: translateX(-50%);
    width: 8px; height: 8px;
    background: var(--accent); border-radius: 50%;
    box-shadow: 0 0 20px var(--accent);
  }
  
  @media (max-width: 1280px) { .app { grid-template-columns: 300px 1fr 380px; } }
  @media (max-width: 1100px) {
    .app { grid-template-columns: 280px 1fr; }
    .right-panel { position: absolute; right: 0; top: 68px; bottom: 0; width: 380px; z-index: 20; }
  }
  @media (max-width: 820px) {
    .app { grid-template-columns: 1fr; }
    .left-panel { display: none; }
    .right-panel { width: 100%; }
    .hint-bar { display: none; }
    .topbar { padding: 0 12px; gap: 10px; }
  }
  
  .num { font-variant-numeric: tabular-nums; }
  
  .focus-ring {
    position: absolute; pointer-events: none;
    width: 100px; height: 100px;
    transform: translate(-50%, -50%);
    opacity: 0; transition: opacity 0.3s;
  }
  .focus-ring.show { opacity: 1; }
  .focus-ring::before, .focus-ring::after {
    content: ''; position: absolute; inset: 0;
    border: 1px solid var(--accent);
    border-radius: 50%;
    animation: focus-pulse 2s ease-out infinite;
  }
  .focus-ring::after { animation-delay: 1s; }
  @keyframes focus-pulse {
    0% { transform: scale(0.4); opacity: 1; }
    100% { transform: scale(1.4); opacity: 0; }
  }
  
  .time-display { display: flex; flex-direction: column; gap: 2px; flex-shrink: 0; }
  .time-display-label { color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase; font-size: 9px; }
  .time-display-value { font-family: 'JetBrains Mono', monospace; color: var(--accent-2); font-size: 13px; }
  .time-bar-inner { flex: 1; min-width: 0; }
  
  .transition-overlay {
    position: fixed; inset: 0;
    background: radial-gradient(circle at center, transparent 0%, transparent 30%, var(--bg) 100%);
    pointer-events: none; z-index: 50;
    opacity: 0; transition: opacity 0.4s;
  }
  .transition-overlay.active { opacity: 1; }
</style>
</head>
<body>

<div class="loader" id="loader">
  <div class="loader-orbit"></div>
  <div class="font-display text-2xl mt-6" style="color: var(--accent);">SOLARIUM</div>
  <div class="text-xs mt-2" style="color: var(--muted); letter-spacing: 0.3em;">CALIBRATING ORBITS</div>
</div>

<div class="transition-overlay" id="transition-overlay"></div>

<div class="app">
  <header class="topbar">
    <div class="topbar-section">
      <div class="logo-mark"></div>
      <div>
        <div class="font-display text-2xl leading-none" style="letter-spacing: 0.02em;">SOLARIUM</div>
        <div class="text-[10px] tracking-[0.3em] uppercase" style="color: var(--muted);">Solar System Model</div>
      </div>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-section">
      <button class="ctrl-btn" id="btn-orbits" title="显示轨道"><i class="fa-regular fa-circle"></i></button>
      <button class="ctrl-btn" id="btn-labels" title="显示标签"><i class="fa-solid fa-tag"></i></button>
      <button class="ctrl-btn" id="btn-glow" title="行星辉光"><i class="fa-solid fa-sun"></i></button>
      <button class="ctrl-btn" id="btn-realistic" title="真实尺度"><i class="fa-solid fa-ruler"></i></button>
      <button class="ctrl-btn" id="btn-reset" title="重置视角"><i class="fa-solid fa-arrows-rotate"></i></button>
      <div class="w-px h-6 mx-1" style="background: var(--border);"></div>
      <button class="ctrl-btn" id="btn-play" title="播放/暂停"><i class="fa-solid fa-pause"></i></button>
    </div>
    <div class="topbar-spacer"></div>
    <div class="topbar-section">
      <div class="time-display">
        <div class="time-display-label">模拟日期</div>
        <div class="time-display-value num" id="sim-date">2024-01-01</div>
      </div>
      <div class="time-display" style="margin-left: 16px;">
        <div class="time-display-label">已运行</div>
        <div class="time-display-value num" id="sim-elapsed">0 天</div>
      </div>
    </div>
  </header>

  <aside class="left-panel">
    <div class="section-title"><i class="fa-solid fa-book-bookmark text-[10px]"></i>天体目录</div>
    <div id="planet-list"></div>
    <div class="section-title mt-6"><i class="fa-solid fa-compass text-[10px]"></i>导航</div>
    <div class="space-y-2">
      <button class="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-white/5 transition" style="border: 1px solid var(--border);" id="nav-tour">
        <i class="fa-solid fa-route mr-2" style="color: var(--accent);"></i>开启太空之旅
      </button>
      <button class="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-white/5 transition" style="border: 1px solid var(--border);" id="nav-quiz">
        <i class="fa-solid fa-question mr-2" style="color: var(--accent-3);"></i>知识小测验
      </button>
      <button class="w-full text-left px-3 py-2 rounded-lg text-sm hover:bg-white/5 transition" style="border: 1px solid var(--border);" id="nav-about">
        <i class="fa-solid fa-circle-info mr-2" style="color: var(--fg-dim);"></i>关于本模型
      </button>
    </div>
    <div class="section-title mt-6"><i class="fa-solid fa-chart-line text-[10px]"></i>太阳系剖面</div>
    <div class="info-card" style="padding: 8px;">
      <svg class="solar-svg" viewBox="0 0 300 120" id="solar-svg">
        <circle cx="20" cy="60" r="6" fill="#ff9544" filter="url(#sun-glow)"/>
        <defs><filter id="sun-glow"><feGaussianBlur stdDeviation="2"/></filter></defs>
      </svg>
    </div>
  </aside>

  <main class="canvas-wrap">
    <canvas id="scene-canvas"></canvas>
    <div class="overlay hint-bar">
      <span><i class="fa-solid fa-arrows-up-down-left-right mr-1.5" style="color:var(--accent);"></i>拖动旋转</span>
      <span><i class="fa-solid fa-magnifying-glass-plus mr-1.5" style="color:var(--accent);"></i>滚轮缩放</span>
      <span><kbd>Space</kbd>暂停</span>
      <span><kbd>1-8</kbd>选行星</span>
      <span><kbd>Esc</kbd>关闭</span>
    </div>
    <div class="overlay time-bar">
      <button class="ctrl-btn flex-shrink-0" id="btn-play2"><i class="fa-solid fa-pause"></i></button>
      <div class="time-bar-inner">
        <div class="flex justify-between text-[10px] mb-1.5" style="color: var(--muted); letter-spacing: 0.15em; text-transform: uppercase;">
          <span>时间流速</span>
          <span id="speed-label" style="color: var(--accent-2);">1 天 / 秒</span>
        </div>
        <input type="range" class="time-slider" id="speed-slider" min="0" max="6" step="0.01" value="1">
        <div class="flex justify-between text-[9px] mt-1" style="color: var(--muted); font-family: 'JetBrains Mono', monospace;">
          <span>暂停</span><span>1天</span><span>1周</span><span>1月</span><span>1季</span><span>1年</span><span>5年</span>
        </div>
      </div>
    </div>
    <div id="label-layer" class="absolute inset-0 pointer-events-none"></div>
    <div class="focus-ring" id="focus-ring"></div>
  </main>

  <aside class="right-panel" id="right-panel">
    <div class="right-panel-header">
      <button class="back-btn" id="back-btn">
        <i class="fa-solid fa-arrow-left text-[10px]"></i>
        <span>返回星图</span>
      </button>
      <button class="close-btn" id="close-btn" title="关闭面板 (Esc)">
        <i class="fa-solid fa-xmark"></i>
      </button>
    </div>
    <div class="right-panel-body" id="detail-content"></div>
  </aside>
</div>

<div class="toast" id="toast"></div>

<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

// ============== 行星数据库 ==============
// 使用 threejs.org 官方镜像（解决 GitHub raw 的 CORS 问题）
const TEX_BASE = 'https://threejs.org/examples/textures/planets/';

const PLANETS = [
  {

// ============== 纹理加载器（带缓存 + 降级） ==============
const textureLoader = new THREE.TextureLoader();
textureLoader.crossOrigin = 'anonymous';
const textureCache = {};
function loadTexture(url) {
  if (textureCache[url]) return textureCache[url];
  const promise = new Promise((resolve, reject) => {
    textureLoader.load(url, tex => {
      tex.colorSpace = THREE.SRGBColorSpace;
      tex.anisotropy = 8;
      resolve(tex);
    }, undefined, err => {
      console.warn('纹理加载失败:', url, err);
      reject(err);
    });
  });
  textureCache[url] = promise;
  return promise;
}

// ============== 多层星空（动态闪烁 + 十字光芒） ==============
function createStarfield() {
  const geo = new THREE.BufferGeometry();
  const positions = [], colors = [], sizes = [], phases = [];
  const count = 8000;
  for (let i = 0; i < count; i++) {
    const r = 600 + Math.random() * 800;
    const theta = Math.random() * Math.PI * 2;
    const phi = Math.acos(2 * Math.random() - 1);
    positions.push(
      r * Math.sin(phi) * Math.cos(theta),
      r * Math.sin(phi) * Math.sin(theta),
      r * Math.cos(phi)
    );
    const t = Math.random();
    if (t < 0.65) colors.push(1, 1, 0.95);          // 白色
    else if (t < 0.85) colors.push(0.7, 0.85, 1);   // 蓝白
    else if (t < 0.95) colors.push(1, 0.85, 0.6);   // 黄橙
    else colors.push(1, 0.6, 0.7);                   // 红粉
    sizes.push(Math.random() * 2.5 + 0.5);
    phases.push(Math.random() * Math.PI * 2);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('aColor', new THREE.Float32BufferAttribute(colors, 3));
  geo.setAttribute('aSize', new THREE.Float32BufferAttribute(sizes, 1));
  geo.setAttribute('aPhase', new THREE.Float32BufferAttribute(phases, 1));
  
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute vec3 aColor;
      attribute float aSize;
      attribute float aPhase;
      varying vec3 vColor;
      varying float vTwinkle;
      uniform float uTime;
      void main() {
        vColor = aColor;
        vTwinkle = 0.5 + 0.5 * sin(uTime * 2.0 + aPhase * 3.0);
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_Position = projectionMatrix * mvPosition;
        gl_PointSize = aSize * (1.0 + vTwinkle * 1.2) * (300.0 / -mvPosition.z);
      }
    `,
    fragmentShader: `
      varying vec3 vColor;
      varying float vTwinkle;
      void main() {
        vec2 c = gl_PointCoord - 0.5;
        float d = length(c);
        if (d > 0.5) discard;
        // 圆形核心
        float core = smoothstep(0.5, 0.0, d);
        // 十字光芒
        float cross = max(
          smoothstep(0.02, 0.0, abs(c.x)) * smoothstep(0.5, 0.0, abs(c.y)),
          smoothstep(0.02, 0.0, abs(c.y)) * smoothstep(0.5, 0.0, abs(c.x))
        );
        float a = core * (0.4 + vTwinkle * 0.6);
        a = max(a, cross * vTwinkle * 0.7);
        gl_FragColor = vec4(vColor * (1.0 + vTwinkle * 0.5), a);
      }
    `,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  return new THREE.Points(geo, mat);
}
const starfield = createStarfield();
scene.add(starfield);

function createGalaxyBand() {
  const geo = new THREE.BufferGeometry();
  const positions = [], colors = [], sizes = [], phases = [];
  const count = 3000;
  for (let i = 0; i < count; i++) {
    // 沿一个倾斜的带状区域分布
    const theta = Math.random() * Math.PI * 2;
    const r = 700 + Math.random() * 400;
    const bandWidth = 80;
    const y = (Math.random() - 0.5) * bandWidth + Math.sin(theta * 3) * 30;
    positions.push(
      r * Math.cos(theta),
      y,
      r * Math.sin(theta)
    );
    const t = Math.random();
    if (t < 0.5) colors.push(1, 0.95, 0.8);
    else if (t < 0.8) colors.push(0.8, 0.9, 1);
    else colors.push(1, 0.7, 0.5);
    sizes.push(Math.random() * 1.8 + 0.4);
    phases.push(Math.random() * Math.PI * 2);
  }
  geo.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
  geo.setAttribute('aColor', new THREE.Float32BufferAttribute(colors, 3));
  geo.setAttribute('aSize', new THREE.Float32BufferAttribute(sizes, 1));
  geo.setAttribute('aPhase', new THREE.Float32BufferAttribute(phases, 1));
  
  // 复用星空着色器
  const mat = starfield.material.clone();

  const points = new THREE.Points(geo, mat);
  points.rotation.z = Math.PI * 0.15;
  points.rotation.x = Math.PI * 0.1;
  return points;
}

// ============== 远景流动星云（着色器噪声 + 多色） ==============
function createNebulaCloud() {
  const group = new THREE.Group();
  const configs = [
    { color: new THREE.Color(0.8, 0.3, 0.6), pos: [-380, 80, -300], scale: 380, opacity: 0.25 },
    { color: new THREE.Color(0.3, 0.5, 0.9), pos: [400, -60, -200], scale: 420, opacity: 0.22 },
    { color: new THREE.Color(1.0, 0.6, 0.3), pos: [200, 140, 400], scale: 350, opacity: 0.20 },
    { color: new THREE.Color(0.4, 0.8, 0.7), pos: [-400, -40, 200], scale: 300, opacity: 0.18 },
    { color: new THREE.Color(0.7, 0.4, 0.9), pos: [300, -120, 350], scale: 320, opacity: 0.15 },
    { color: new THREE.Color(0.9, 0.5, 0.4), pos: [-300, 100, -400], scale: 280, opacity: 0.18 },
  ];
  configs.forEach((cfg, i) => {
    const geo = new THREE.SphereGeometry(1, 32, 32);
    const mat = new THREE.ShaderMaterial({
      uniforms: {
        uTime: { value: 0 },
        uColor: { value: cfg.color },
        uOpacity: { value: cfg.opacity },
        uSeed: { value: i * 13.7 }
      },
      vertexShader: `
        varying vec3 vPos; varying vec3 vNormal;
        void main() {
          vPos = position; vNormal = normal;
          gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
        }
      `,
      fragmentShader: `
        uniform float uTime;
        uniform vec3 uColor;
        uniform float uOpacity;
        uniform float uSeed;
        varying vec3 vPos; varying vec3 vNormal;
        float hash(vec3 p) { return fract(sin(dot(p, vec3(12.9898, 78.233, 45.164))) * 43758.5453); }
        float noise(vec3 p) {
          vec3 i = floor(p); vec3 f = fract(p);
          f = f * f * (3.0 - 2.0 * f);
          return mix(mix(mix(hash(i), hash(i + vec3(1,0,0)), f.x),
                         mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
                     mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
                         mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y), f.z);
        }
        float fbm(vec3 p) {
          float v = 0.0, a = 0.5;
          for (int i = 0; i < 5; i++) { v += a * noise(p); p *= 2.0; a *= 0.5; }
          return v;
        }
        void main() {
          vec3 p = vPos * 2.0 + vec3(uTime * 0.05, uTime * 0.03, uSeed);
          float n = fbm(p);
          float n2 = fbm(p * 1.8 + uTime * 0.1);
          float intensity = smoothstep(0.25, 0.95, n * 0.7 + n2 * 0.5);
          float edge = pow(max(0.0, dot(vNormal, vec3(0.0, 0.0, 1.0))), 0.8);
          edge = mix(0.15, 1.0, edge);
          float alpha = intensity * edge * uOpacity;
          vec3 col = uColor * (0.6 + n * 0.9);
          col += vec3(1.0, 0.95, 0.8) * pow(n2, 4.0) * 0.6;
          gl_FragColor = vec4(col, alpha);
        }
      `,
      transparent: true, depthWrite: false, blending: THREE.AdditiveBlending, side: THREE.BackSide
    });
    const mesh = new THREE.Mesh(geo, mat);
    mesh.position.set(...cfg.pos);
    mesh.scale.setScalar(cfg.scale);
    group.add(mesh);
  });
  return group;
}

function createDustParticles() {
  const geo = new THREE.BufferGeometry();
  const count = 600;
  const positions = new Float32Array(count * 3);
  const velocities = new Float32Array(count * 3);
  const sizes = new Float32Array(count);
  for (let i = 0; i < count; i++) {
    const r = 30 + Math.random() * 80;
    const theta = Math.random() * Math.PI * 2;
    const phi = (Math.random() - 0.5) * 0.5;
    positions[i*3] = r * Math.cos(theta) * Math.cos(phi);
    positions[i*3+1] = r * Math.sin(phi) * 2;
    positions[i*3+2] = r * Math.sin(theta) * Math.cos(phi);
    velocities[i*3] = (Math.random() - 0.5) * 0.025;
    velocities[i*3+1] = (Math.random() - 0.5) * 0.015;
    velocities[i*3+2] = (Math.random() - 0.5) * 0.025;
    sizes[i] = Math.random() * 0.5 + 0.15;
  }
  geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
  geo.setAttribute('aSize', new THREE.BufferAttribute(sizes, 1));
  const mat = new THREE.ShaderMaterial({
    uniforms: { uTime: { value: 0 } },
    vertexShader: `
      attribute float aSize;
      varying float vAlpha;
      void main() {
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        gl_Position = projectionMatrix * mvPosition;
        gl_PointSize = aSize * (200.0 / -mvPosition.z);
        vAlpha = smoothstep(200.0, 50.0, -mvPosition.z);
      }
    `,
    fragmentShader: `
      varying float vAlpha;
      void main() {
        vec2 c = gl_PointCoord - 0.5;
        float d = length(c);
        if (d > 0.5) discard;
        float a = smoothstep(0.5, 0.0, d) * vAlpha * 0.6;
        gl_FragColor = vec4(1.0, 0.85, 0.6, a);
      }
    `,
    transparent: true, depthWrite: false, blending: THREE.AdditiveBlending
  });
  const points = new THREE.Points(geo, mat);
  points.userData.velocities = velocities;
  return points;
}

// ============== 流星雨系统 ==============
class MeteorSystem {
  constructor() { this.meteors = []; this.maxMeteors = 5; }
  spawn() {
    if (this.meteors.length >= this.maxMeteors) return;
    const startR = 200 + Math.random() * 100;
    const startTheta = Math.random() * Math.PI * 2;
    const startPhi = Math.random() * Math.PI * 0.6 + Math.PI * 0.2;
    const startPos = new THREE.Vector3(
      startR * Math.sin(startPhi) * Math.cos(startTheta),
      startR * Math.cos(startPhi),
      startR * Math.sin(startPhi) * Math.sin(startTheta)
    );
    const dir = new THREE.Vector3(
      -startPos.x * 0.5 + (Math.random() - 0.5) * 100,
      -startPos.y * 0.3 + (Math.random() - 0.5) * 50,
      -startPos.z * 0.5 + (Math.random() - 0.5) * 100
    ).normalize();
    const trailLen = 28;
    const positions = new Float32Array(trailLen * 3);
    const alphas = new Float32Array(trailLen);
    for (let i = 0; i < trailLen; i++) {
      positions[i*3] = startPos.x;
      positions[i*3+1] = startPos.y;
      positions[i*3+2] = startPos.z;
      alphas[i] = 1.0 - i / trailLen;
    }
    const geo = new THREE.BufferGeometry();
    geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
    geo.setAttribute('aAlpha', new THREE.BufferAttribute(alphas, 1));
    
    // 流星颜色随机：白/蓝/橙
    const colors = [new THREE.Color(0xffd4a0), new THREE.Color(0xa0d4ff), new THREE.Color(0xffb070)];
    const color = colors[Math.floor(Math.random() * colors.length)];
    
    const mat = new THREE.ShaderMaterial({
      uniforms: { uColor: { value: color } },
      vertexShader: `
        attribute float aAlpha;
        varying float vAlpha;
        void main() { vAlpha = aAlpha; gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }
      `,
      fragmentShader: `
        uniform vec3 uColor; varying float vAlpha;
        void main() { gl_FragColor = vec4(uColor, vAlpha); }
      `,
      transparent: true, blending: THREE.AdditiveBlending, depthWrite: false
    });
    const line = new THREE.Line(geo, mat);
    scene.add(line);
    this.meteors.push({ line, positions, dir, speed: 2.5 + Math.random() * 3, life: 0, maxLife: 130, trailLen });
  }
  update() {
    if (Math.random() < 0.012) this.spawn();
    for (let i = this.meteors.length - 1; i >= 0; i--) {
      const m = this.meteors[i];
      m.life++;
      for (let j = m.trailLen - 1; j > 0; j--) {
        m.positions[j*3] = m.positions[(j-1)*3];
        m.positions[j*3+1] = m.positions[(j-1)*3+1];
        m.positions[j*3+2] = m.positions[(j-1)*3+2];
      }
      m.positions[0] += m.dir.x * m.speed;
      m.positions[1] += m.dir.y * m.speed;
      m.positions[2] += m.dir.z * m.speed;
      m.line.geometry.attributes.position.needsUpdate = true;
      if (m.life > m.maxLife) {
        scene.remove(m.line);
        m.line.geometry.dispose();
        m.line.material.dispose();
        this.meteors.splice(i, 1);
      }
    }
  }
}

  uniforms: { uTime: { value: 0 } },
  vertexShader: `
    varying vec3 vPos; varying vec3 vNormal;
    void main() {
      vPos = position; vNormal = normal;
      gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
    }
  `,
  fragmentShader: `
    uniform float uTime;
    varying vec3 vPos; varying vec3 vNormal;
    float hash(vec3 p) { return fract(sin(dot(p, vec3(12.9898, 78.233, 45.164))) * 43758.5453); }
    float noise(vec3 p) {
      vec3 i = floor(p); vec3 f = fract(p);
      f = f * f * (3.0 - 2.0 * f);
      return mix(mix(mix(hash(i), hash(i + vec3(1,0,0)), f.x),
                     mix(hash(i + vec3(0,1,0)), hash(i + vec3(1,1,0)), f.x), f.y),
                 mix(mix(hash(i + vec3(0,0,1)), hash(i + vec3(1,0,1)), f.x),
                     mix(hash(i + vec3(0,1,1)), hash(i + vec3(1,1,1)), f.x), f.y), f.z);
    }
    float fbm(vec3 p) {
      float v = 0.0, a = 0.5;
      for (int i = 0; i < 5; i++) { v += a * noise(p); p *= 2.0; a *= 0.5; }
      return v;
    }
    void main() {
      vec3 p = vPos * 0.8;
      p.y -= uTime * 0.15;
      float n1 = fbm(p);
      float n2 = fbm(p * 2.5 + uTime * 0.3);
      float n3 = fbm(p * 6.0 - uTime * 0.5);
      vec3 colDeep = vec3(0.5, 0.08, 0.0);
      vec3 colMid = vec3(1.0, 0.4, 0.05);
      vec3 colHot = vec3(1.0, 0.85, 0.4);
      vec3 colFlare = vec3(1.0, 1.0, 0.85);
      vec3 col = mix(colDeep, colMid, n1);
      col = mix(col, colHot, n2 * 0.8);
      col = mix(col, colFlare, pow(n3, 3.0) * 0.8);
      float edge = 1.0 - max(0.0, dot(vNormal, vec3(0.0, 0.0, 1.0)));
      col += vec3(1.0, 0.5, 0.2) * pow(edge, 3.0) * 0.6;
      gl_FragColor = vec4(col, 1.0);
    }
  `
});

function createGlowSprite(color, size, opacity) {
  const cv = document.createElement('canvas');
  cv.width = 256; cv.height = 256;
  const ctx = cv.getContext('2d');
  const hex = '#' + color.toString(16).padStart(6, '0');
  const g = ctx.createRadialGradient(128, 128, 0, 128, 128, 128);
  g.addColorStop(0, hex);
  g.addColorStop(0.2, hex + 'cc');
  g.addColorStop(0.5, hex + '40');
  g.addColorStop(1, hex + '00');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, 256, 256);
  const tex = new THREE.CanvasTexture(cv);
  const mat = new THREE.SpriteMaterial({
    map: tex, transparent: true, depthWrite: false,
    blending: THREE.AdditiveBlending, opacity
  });
  const sprite = new THREE.Sprite(mat);
  sprite.scale.set(size, size, 1);
  return sprite;
}

// 行星大气层材质
function createAtmosphereMaterial(glowColor, intensity) {
  return new THREE.ShaderMaterial({
    uniforms: {
      uGlowColor: { value: new THREE.Color(glowColor) },
      uIntensity: { value: intensity }
    },
    vertexShader: `
      varying vec3 vNormal; varying vec3 vViewDir;
      void main() {
        vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
        vNormal = normalize(normalMatrix * normal);
        vViewDir = normalize(-mvPosition.xyz);
        gl_Position = projectionMatrix * mvPosition;
      }
    `,
    fragmentShader: `
      uniform vec3 uGlowColor; uniform float uIntensity;
      varying vec3 vNormal; varying vec3 vViewDir;
      void main() {
        float fresnel = 1.0 - max(0.0, dot(vNormal, vViewDir));
        float glow = pow(fresnel, 2.5) * uIntensity;
        gl_FragColor = vec4(uGlowColor, glow);
      }
    `,
    transparent: true, blending: THREE.AdditiveBlending, side: THREE.BackSide, depthWrite: false
  });
}

// ============== 创建土星环（真实双面贴图 + 降级方案） ==============
function createSaturnRing(p, scale = 1) {
  const group = new THREE.Group();
  const innerR = Math.max(0.1, p.ringInner * scale);
  const outerR = Math.max(innerR + 0.1, p.ringOuter * scale);
  
  const ringGeo = new THREE.RingGeometry(innerR, outerR, 192, 8);
  // 修正 UV：让纹理沿径向分布
  const pos = ringGeo.attributes.position;
  const uv = ringGeo.attributes.uv;
  for (let j = 0; j < pos.count; j++) {
    const x = pos.getX(j), y = pos.getY(j);
    const r = Math.sqrt(x*x + y*y);
    const t = (r - innerR) / (outerR - innerR);
    uv.setXY(j, t, 0.5);
  }
  
  const ringMat = new THREE.MeshBasicMaterial({
    color: 0xffffff,
    transparent: true,
    opacity: 1.0,
    side: THREE.DoubleSide,
    depthWrite: false,
    blending: THREE.NormalBlending
  });
  
  // 先放程序化纹理作为降级方案，再异步替换为真实纹理
  const fallbackCanvas = document.createElement('canvas');
  fallbackCanvas.width = 512; fallbackCanvas.height = 1;
  const fctx = fallbackCanvas.getContext('2d');
  for (let x = 0; x < 512; x++) {
    const t = x / 512;
    // 模拟土星环的主要结构：A环、B环、C环 + 卡西尼缝
    let alpha = 0;
    if (t < 0.1) alpha = 0.2;                              // C环
    else if (t < 0.45) alpha = 0.85 + Math.sin(t * 40) * 0.1; // B环
    else if (t < 0.5) alpha = 0.05;                        // 卡西尼缝
    else if (t < 0.9) alpha = 0.7 + Math.sin(t * 30) * 0.15; // A环
    else alpha = 0.1;                                      // F环外侧
    alpha += (Math.random() - 0.5) * 0.1;
    alpha = Math.max(0, Math.min(1, alpha));
    const r = 200 + Math.random() * 40;
    const g = 180 + Math.random() * 30;
    const b = 140 + Math.random() * 30;
    fctx.fillStyle = `rgba(${r},${g},${b},${alpha})`;
    fctx.fillRect(x, 0, 1, 1);
  }
  const fallbackTex = new THREE.CanvasTexture(fallbackCanvas);
  fallbackTex.colorSpace = THREE.SRGBColorSpace;
  ringMat.map = fallbackTex;
  ringMat.alphaMap = fallbackTex;
  ringMat.needsUpdate = true;
  
  // 异步加载真实环纹理（替换降级方案）
  if (p.ringTextureUrl) {
    loadTexture(p.ringTextureUrl).then(tex => {
      ringMat.map = tex;
      ringMat.alphaMap = tex;
      ringMat.color.setHex(0xffffff);
      ringMat.needsUpdate = true;
    }).catch(() => {
      console.log('使用程序化土星环纹理（降级）');
    });
  }
  
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  ring.rotation.y = p.axialTilt * Math.PI / 180 * 0.3;
  group.add(ring);
  return group;
}

// 程序化环（木星/天王星）
function createProceduralRing(p, scale = 1) {
  const group = new THREE.Group();
  const innerR = Math.max(0.1, p.ringInner * scale);
  const outerR = Math.max(innerR + 0.1, p.ringOuter * scale);
  
  const ringGeo = new THREE.RingGeometry(innerR, outerR, 128, 4);
  const pos = ringGeo.attributes.position;
  const uv = ringGeo.attributes.uv;
  for (let j = 0; j < pos.count; j++) {
    const x = pos.getX(j), y = pos.getY(j);
    const r = Math.sqrt(x*x + y*y);
    const t = (r - innerR) / (outerR - innerR);
    uv.setXY(j, t, 0.5);
  }
  
  const ringCanvas = document.createElement('canvas');
  ringCanvas.width = 512; ringCanvas.height = 1;
  const rctx = ringCanvas.getContext('2d');
  const baseHex = '#' + p.ringColor.toString(16).padStart(6, '0');
  for (let x = 0; x < 512; x++) {
    const t = x / 512;
    const noise = Math.sin(t * 30) * 0.2 + Math.sin(t * 80) * 0.15 + Math.random() * 0.15;
    let alpha = 0.3 + noise * 0.4;
    if (p.id === 'uranus') {
      const ringPos = [0.3, 0.45, 0.55, 0.7, 0.85];
      let inRing = false;
      for (const rp of ringPos) {
        if (Math.abs(t - rp) < 0.02) { inRing = true; break; }
      }
      alpha = inRing ? 0.6 : 0.05;
    }
    alpha = Math.max(0, Math.min(1, alpha));
    rctx.fillStyle = baseHex + Math.floor(alpha * 255).toString(16).padStart(2, '0');
    rctx.fillRect(x, 0, 1, 1);
  }
  const ringTex = new THREE.CanvasTexture(ringCanvas);
  ringTex.colorSpace = THREE.SRGBColorSpace;
  
  const ringMat = new THREE.MeshBasicMaterial({
    map: ringTex, transparent: true, opacity: p.ringOpacity,
    side: THREE.DoubleSide, depthWrite: false
  });
  
  const ring = new THREE.Mesh(ringGeo, ringMat);
  ring.rotation.x = Math.PI / 2;
  ring.rotation.y = p.axialTilt * Math.PI / 180 * 0.3;
  group.add(ring);
  return group;
}

    { size: p.radius * 3.8, opacity: 0.18 * p.glowIntensity },
    { size: p.radius * 5.5, opacity: 0.08 * p.glowIntensity },
  ].forEach(l => glowGroup.add(createGlowSprite(p.glowColor, l.size, l.opacity)));
  group.add(glowGroup);
  
  if (p.hasRing) {
    let ringObj;
    if (p.id === 'saturn') {
      ringObj = createSaturnRing(p, 1);
    } else {
      ringObj = createProceduralRing(p, 1);
    }
    group.add(ringObj);
  }
  
  let moonGroup = null;
  if (p.hasMoon) {
    moonGroup = new THREE.Group();
    const moonGeo = new THREE.SphereGeometry(0.27, 32, 32);
    const moonMat = new THREE.MeshStandardMaterial({ color: 0xb8b0a0, roughness: 1 });
    loadTexture(TEX_BASE + 'moon_1024.jpg').then(tex => {

    }).catch(() => {});
    const moon = new THREE.Mesh(moonGeo, moonMat);
    moon.position.x = 2;
    moonGroup.add(moon);
    group.add(moonGroup);
  }
  
  const orbitPoints = [];
  for (let a = 0; a <= 256; a++) {
    const t = (a / 256) * Math.PI * 2;
    orbitPoints.push(new THREE.Vector3(Math.cos(t) * p.distance, 0, Math.sin(t) * p.distance));
  }
  const orbitGeo = new THREE.BufferGeometry().setFromPoints(orbitPoints);
  const orbitMat = new THREE.LineBasicMaterial({ color: p.color, transparent: true, opacity: 0.25 });
  const orbit = new THREE.Line(orbitGeo, orbitMat);
  scene.add(orbit);
  orbitLines.push(orbit);
  
  const initAngle = (i / PLANETS.length) * Math.PI * 2 + Math.random() * 0.5;
  group.position.set(Math.cos(initAngle) * p.distance, 0, Math.sin(initAngle) * p.distance);
  
  scene.add(group);
  planetMeshes.push({ group, mesh, atmoMesh, glowGroup, data: p, angle: initAngle, moonGroup, orbit });
});

let currentDetailScene = null;
function cleanupDetailScene() {
  if (!currentDetailScene) return;
  cancelAnimationFrame(currentDetailScene.animId);
  if (currentDetailScene.resizeObs) currentDetailScene.resizeObs.disconnect();
  currentDetailScene.scene.traverse(obj => {
    if (obj.geometry) obj.geometry.dispose();
    if (obj.material) {
      if (Array.isArray(obj.material)) obj.material.forEach(m => m.dispose());
      else obj.material.dispose();
    }
  });
  currentDetailScene.renderer.dispose();
  const el = document.getElementById('detail-3d-canvas');
  if (el && el.parentNode) el.parentNode.removeChild(el);
  currentDetailScene = null;
}

function initDetail3D(p) {

  const dCamera = new THREE.PerspectiveCamera(40, w/h, 0.1, 100);
  const hasRing = p.hasRing;
  const baseDist = hasRing ? 6.5 : 4.5;
  dCamera.position.set(0, 0.8, baseDist);
  
  const dRenderer = new THREE.WebGLRenderer({ canvas: detailCanvas, antialias: true, alpha: true });
  dRenderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  dRenderer.setSize(w, h, false);
  dRenderer.outputColorSpace = THREE.SRGBColorSpace;
  dRenderer.toneMapping = THREE.ACESFilmicToneMapping;
  dRenderer.toneMappingExposure = 1.2;

  dControls.enableDamping = true;

  dControls.minDistance = 2.5;
  dControls.maxDistance = hasRing ? 12 : 8;
  dControls.enablePan = false;
  
  const dAmbient = new THREE.AmbientLight(0x6a7080, 0.4);
  dScene.add(dAmbient);
  const dSun = new THREE.DirectionalLight(0xffe8c0, 1.8);
  dSun.position.set(5, 2, 3);
  dScene.add(dSun);
  const dRim = new THREE.DirectionalLight(0x4488ff, 0.4);
  dRim.position.set(-5, -2, -3);
  dScene.add(dRim);
  
  const sphereGeo = new THREE.SphereGeometry(1.5, 96, 96);
  const sphereMat = new THREE.MeshStandardMaterial({
    color: p.color, roughness: 0.75, metalness: 0.05
  });
  const sphere = new THREE.Mesh(sphereGeo, sphereMat);
  sphere.rotation.z = p.axialTilt * Math.PI / 180;
  dScene.add(sphere);
  
  const atmoMat = createAtmosphereMaterial(p.glowColor, p.glowIntensity * 0.9);
  const atmoGeo = new THREE.SphereGeometry(1.62, 64, 64);
  const atmoMesh = new THREE.Mesh(atmoGeo, atmoMat);
  atmoMesh.rotation.z = p.axialTilt * Math.PI / 180;
  dScene.add(atmoMesh);
  
  const dGlowSprite = createGlowSprite(p.glowColor, 5, 0.4 * p.glowIntensity);
  dScene.add(dGlowSprite);
  
  if (hasRing) {
    if (p.id === 'saturn') {
      const ring = createSaturnRing(p, 0.55);
      dScene.add(ring);
    } else {
      const ring = createProceduralRing(p, 0.55);
      dScene.add(ring);
    }
  }
  
  loadTexture(p.textureUrl).then(tex => {
    sphereMat.map = tex;
    sphereMat.color.setHex(0xffffff);
    sphereMat.needsUpdate = true;
    loadingEl.classList.add('hide');
  }).catch(() => {
    loadingEl.classList.add('hide');
  });
  
  let moonSphere = null;
  if (p.hasMoon) {
    const moonGeo = new THREE.SphereGeometry(0.27, 32, 32);
    const moonMat = new THREE.MeshStandardMaterial({ color: 0xb8b0a0, roughness: 1 });
    loadTexture(TEX_BASE + 'moon_1024.jpg').then(tex => {
      moonMat.map = tex;
      moonMat.needsUpdate = true;
    }).catch(() => {});
    moonSphere = new THREE.Mesh(moonGeo, moonMat);
    moonSphere.position.set(2.4, 0.3, 0);
    dScene.add(moonSphere);
  }
  
  const detailClock = new THREE.Clock();
  function detailAnimate() {
    currentDetailScene.animId = requestAnimationFrame(detailAnimate);
    const dt = detailClock.getDelta();
    sphere.rotation.y += dt * 0.15;
    if (moonSphere) {
      moonSphere.position.x = Math.cos(detailClock.elapsedTime * 0.5) * 2.4;
      moonSphere.position.z = Math.sin(detailClock.elapsedTime * 0.5) * 2.4;
      moonSphere.rotation.y += dt * 0.1;
    }
    const breath = 1 + Math.sin(detailClock.elapsedTime * 0.8) * 0.05;
    dGlowSprite.scale.set(5 * breath, 5 * breath, 1);
    dControls.update();
    dRenderer.render(dScene, dCamera);
  }
  
  currentDetailScene = { scene: dScene, renderer: dRenderer, animId: null };
  detailAnimate();
  
  const resizeObs = new ResizeObserver(() => {
    const nw = wrap.clientWidth, nh = wrap.clientHeight;
    if (nw === 0 || nh === 0) return;
    dCamera.aspect = nw / nh;
    dCamera.updateProjectionMatrix();
    dRenderer.setSize(nw, nh, false);
  });
  resizeObs.observe(wrap);
  currentDetailScene.resizeObs = resizeObs;
}

function transitionTo(camTo, tarTo, duration = 1000) {
  const overlay = document.getElementById('transition-overlay');
  const startCam = camera.position.clone();
  const startTarget = controls.target.clone();
  const start = performance.now();
  overlay.classList.add('active');
  setTimeout(() => {
    function step() {
      const t = Math.min(1, (performance.now() - start) / duration);
      const ease = t < 0.5 ? 2*t*t : 1 - Math.pow(-2*t+2, 2)/2;
      camera.position.lerpVectors(startCam, camTo, ease);
      controls.target.lerpVectors(startTarget, tarTo, ease);
      if (t < 1) requestAnimationFrame(step);
      else overlay.classList.remove('active');
    }
    step();
  }, 200);
}

function focusCameraOn(target) {
  const pos = target.group.position;
  const r = target.data.radius;
  const dist = Math.max(5, r * 6);
  const offset = new THREE.Vector3(dist * 0.8, dist * 0.5, dist);
  const camTo = pos.clone().add(offset);
  transitionTo(camTo, pos.clone(), 1200);
}

const speedSlider = document.getElementById('speed-slider');
const speedLabel = document.getElementById('speed-label');
const speedMap = [
  { v: 0, label: '暂停' }, { v: 1, label: '1 天 / 秒' },
  { v: 2, label: '1 周 / 秒' }, { v: 3, label: '1 月 / 秒' },
  { v: 4, label: '1 季 / 秒' }, { v: 5, label: '1 年 / 秒' },
  { v: 6, label: '5 年 / 秒' }
];
function speedToValue(s) {
  if (s <= 0.01) return 0;
  if (s < 1.5) return 0 + (s - 0.01) / (1.5 - 0.01);
  if (s < 10) return 1 + (s - 1.5) / (10 - 1.5);
  if (s < 30) return 2 + (s - 10) / (30 - 10);
  if (s < 90) return 3 + (s - 30) / (90 - 30);
  if (s < 365) return 4 + (s - 90) / (365 - 90);
  return 5 + Math.min(1, (s - 365) / (1825 - 365));
}
function valueToSpeed(v) {
  if (v <= 0) return 0;
  if (v <= 1) return 0.01 + (v - 0) * (1.5 - 0.01);
  if (v <= 2) return 1.5 + (v - 1) * (10 - 1.5);
  if (v <= 3) return 10 + (v - 2) * (30 - 10);
  if (v <= 4) return 30 + (v - 3) * (90 - 30);
  if (v <= 5) return 90 + (v - 4) * (365 - 90);
  return 365 + (v - 5) * (1825 - 365);
}

function applyScale() {
  planetMeshes.forEach(m => {
    let newDist;
    if (state.realisticScale) {
      newDist = Math.pow(m.data.realDistance, 0.55) * 22;
    } else {
      newDist = m.data.distance;
    }
    m.data._distance = newDist;
    const orbit = m.orbit;
    const points = [];
    for (let a = 0; a <= 256; a++) {
      const t = (a / 256) * Math.PI * 2;
      points.push(new THREE.Vector3(Math.cos(t) * newDist, 0, Math.sin(t) * newDist));
    }
    orbit.geometry.dispose();
    orbit.geometry = new THREE.BufferGeometry().setFromPoints(points);
    orbit.visible = state.showOrbits;
  });
}

  function detailAnimate() {
    currentDetailScene.animId = requestAnimationFrame(detailAnimate);
    const elapsed = detailClock.getElapsedTime();
    sunDMat.uniforms.uTime.value = elapsed;
    sunDMesh.rotation.y += 0.003;
    dControls.update();
    dRenderer.render(dScene, dCamera);
  }
  currentDetailScene = { scene: dScene, renderer: dRenderer, animId: null };
  detailAnimate();
  
  const resizeObs = new ResizeObserver(() => {
    const nw = wrap.clientWidth, nh = wrap.clientHeight;
    if (nw === 0 || nh === 0) return;
    dCamera.aspect = nw / nh;
    dCamera.updateProjectionMatrix();
    dRenderer.setSize(nw, nh, false);
  });
  resizeObs.observe(wrap);
  currentDetailScene.resizeObs = resizeObs;
}

const labelLayer = document.getElementById('label-layer');
const labels = PLANETS.map(p => {
  const el = document.createElement('div');
  el.className = 'planet-label';
  el.textContent = p.name;
  labelLayer.appendChild(el);
  return el;
});

const clock = new THREE.Clock();

function animate() {
  requestAnimationFrame(animate);
  const dt = clock.getDelta();
  const elapsed = clock.elapsedTime;
  
  if (state.playing) {
    state.time += dt * state.speed;
  }
  
  // 太阳更新
  sunMat.uniforms.uTime.value = elapsed;
  sun.rotation.y += dt * 0.05;
  sunGlowGroup.children.forEach((sprite, i) => {
    const baseScale = sunGlowLayers[i].size;
    const breath = 1 + Math.sin(elapsed * 0.8 + i * 0.5) * 0.04;
    sprite.scale.setScalar(baseScale * breath);
  });
  shockwave.children.forEach(ring => {
    const t = (elapsed * 0.15 + ring.userData.phase) % 1.0;
    const scale = 1 + t * 4;
    ring.scale.setScalar(scale);
    ring.material.opacity = (1 - t) * 0.4;
  });
  
  // 星空闪烁
  starfield.material.uniforms.uTime.value = elapsed;
  galaxyBand.material.uniforms.uTime.value = elapsed;
  // 星空整体缓慢漂移
  starfield.rotation.y = elapsed * 0.005;
  galaxyBand.rotation.y = elapsed * 0.003;
  
  // 星云流动
  nebula.children.forEach(m => { m.material.uniforms.uTime.value = elapsed; });
  nebula.rotation.y = elapsed * 0.008;
  
  // 尘埃漂浮
  dust.material.uniforms.uTime.value = elapsed;
  const positions = dust.geometry.attributes.position.array;
  const velocities = dust.userData.velocities;
  for (let i = 0; i < positions.length; i += 3) {
    positions[i] += velocities[i];
    positions[i+1] += velocities[i+1];
    positions[i+2] += velocities[i+2];
    const r = Math.sqrt(positions[i]*positions[i] + positions[i+2]*positions[i+2]);
    if (r > 130 || r < 20) {
      velocities[i] *= -1;
      velocities[i+2] *= -1;
    }
  }
  dust.geometry.attributes.position.needsUpdate = true;
  
  // 流星
  meteorSystem.update();
  
  // 行星运动
  planetMeshes.forEach(m => {
    const p = m.data;
    const dist = state.realisticScale ? (p._distance || p.distance) : p.distance;
    if (state.playing) {
      m.angle += (dt * state.speed / 365) * p.orbitSpeed * Math.PI * 2;
    }
    m.group.position.set(Math.cos(m.angle) * dist, 0, Math.sin(m.angle) * dist);
    m.mesh.rotation.y += p.rotationSpeed * (state.playing ? state.speed * 0.5 : 0) * dt + p.rotationSpeed * 0.01;
    if (m.moonGroup && state.playing) {
      m.moonGroup.rotation.y += dt * state.speed * 0.13;
    }
  });
  
  // 相机跟随
  if (state.cameraFollow && state.cameraTarget) {
    const target = state.cameraTarget;
    const offset = controls.target.clone().sub(camera.position);
    controls.target.lerp(target.group.position, 0.08);
    camera.position.copy(controls.target).sub(offset);
  }
  
  controls.update();
  
  // 行星标签
  if (state.showLabels) {
    planetMeshes.forEach((m, i) => {
      const pos = m.group.position.clone();
      pos.project(camera);
      const x = (pos.x * 0.5 + 0.5) * canvas.clientWidth;
      const y = (-pos.y * 0.5 + 0.5) * canvas.clientHeight;
      const visible = pos.z < 1;
      labels[i].style.transform = `translate(calc(${x}px - 50%), calc(${y}px - 50%)) translateX(40px)`;
      labels[i].style.opacity = visible ? (state.selected === m.data.id ? '1' : '0.6') : '0';
      labels[i].style.color = state.selected === m.data.id ? '#' + m.data.color.toString(16).padStart(6, '0') : '';
    });
  }
  
  // 焦点环
  if (state.selected && state.cameraTarget) {
    const ring = document.getElementById('focus-ring');
    const pos = state.cameraTarget.group.position.clone();
    pos.project(camera);
    const x = (pos.x * 0.5 + 0.5) * canvas.clientWidth;
    const y = (-pos.y * 0.5 + 0.5) * canvas.clientHeight;
    ring.style.left = x + 'px';
    ring.style.top = y + 'px';
  }
  
  updateTimeDisplay();
  renderer.render(scene, camera);
}

function updateTimeDisplay() {
  const startDate = new Date('2024-01-01');
  const currentDate = new Date(startDate.getTime() + state.time * 86400000);
  document.getElementById('sim-date').textContent = currentDate.toISOString().slice(0, 10);
  const days = Math.floor(state.time);
  let elapsedStr;
  if (days < 365) elapsedStr = `${days} 天`;
  else if (days < 365 * 100) elapsedStr = `${(days / 365).toFixed(2)} 年`;
  else elapsedStr = `${(days / 365).toFixed(0)} 年`;
  document.getElementById('sim-elapsed').textContent = elapsedStr;
}

function resize() {
  const w = canvasWrap.clientWidth;
  const h = canvasWrap.clientHeight;
  if (w === 0 || h === 0) return;
  camera.aspect = w / h;
  camera.updateProjectionMatrix();
  renderer.setSize(w, h, false);
}
window.addEventListener('resize', resize);
resize();

applyScale();
animate();

setTimeout(() => {
  document.getElementById('loader').classList.add('hide');
  setTimeout(() => {
    showToast('欢迎来到 SOLARIUM · 点击行星探索');
  }, 600);
}, 800);

</script>
